<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Q · Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0a0b;
        --bg-2: #111114;
        --fg: #f5f5f7;
        --fg-muted: #a1a1aa;
        --border: rgba(255,255,255,0.08);
        --accent: #00ffd1;
        --accent-2: #7c5cff;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }
      body {
        background:
          radial-gradient(circle at 20% 0%, rgba(124,92,255,0.12) 0%, transparent 50%),
          radial-gradient(circle at 80% 100%, rgba(0,255,209,0.10) 0%, transparent 50%),
          var(--bg);
        display: flex; flex-direction: column;
      }

      .topbar {
        display: flex; justify-content: space-between; align-items: center;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        background: rgba(10,10,11,0.6);
        backdrop-filter: blur(12px);
      }
      .back {
        display: inline-flex; align-items: center; gap: 6px;
        color: var(--fg-muted); text-decoration: none; font-size: 14px;
        padding: 6px 10px; border-radius: 8px;
      }
      .back:hover { color: var(--fg); background: rgba(255,255,255,0.04); }
      .ainame { font-weight: 700; display: flex; align-items: center; gap: 8px; }
      .live-dot { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 1.5s ease infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

      .messages {
        flex: 1; overflow-y: auto;
        padding: 24px 20px 16px;
        display: flex; flex-direction: column; gap: 12px;
        max-width: 760px; width: 100%; margin: 0 auto;
      }
      .msg {
        max-width: 78%; padding: 12px 16px; border-radius: 18px;
        font-size: 15px; line-height: 1.45;
        animation: msgIn 320ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      .msg.user {
        align-self: flex-end;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        color: #0a0a0b; font-weight: 500;
      }
      .msg.ai {
        align-self: flex-start;
        background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      }
      .msg.thinking { color: var(--fg-muted); font-style: italic; }

      .empty-state {
        text-align: center; padding: 60px 20px; color: var(--fg-muted);
      }
      .empty-state h2 { font-size: 24px; font-weight: 700; color: var(--fg); margin-bottom: 8px; }
      .examples { display: flex; flex-direction: column; gap: 8px; max-width: 360px; margin: 24px auto 0; }
      .example {
        background: rgba(255,255,255,0.03); border: 1px solid var(--border);
        padding: 12px 16px; border-radius: 12px; font-size: 14px;
        font-family: 'JetBrains Mono', monospace; color: var(--fg-muted);
        cursor: pointer; transition: all 200ms ease; text-align: left;
      }
      .example:hover { border-color: var(--accent); color: var(--fg); }

      .composer {
        border-top: 1px solid var(--border);
        padding: 16px 20px;
        background: rgba(10,10,11,0.6); backdrop-filter: blur(12px);
      }
      .composer-inner {
        max-width: 760px; margin: 0 auto;
        display: flex; gap: 10px; align-items: flex-end;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        border-radius: 18px; padding: 8px 8px 8px 16px;
      }
      .composer-inner:focus-within { border-color: rgba(0,255,209,0.4); }
      .composer textarea {
        flex: 1; background: transparent; border: none; color: var(--fg);
        font-size: 15px; font-family: inherit; resize: none;
        outline: none; padding: 8px 0; min-height: 28px; max-height: 200px;
      }
      .send {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        color: #0a0a0b; border: none; border-radius: 12px;
        padding: 8px 16px; font-weight: 700; font-size: 14px; cursor: pointer;
        font-family: inherit;
      }
      .send:disabled { opacity: 0.4; cursor: not-allowed; }

      .err-banner {
        max-width: 760px; margin: 0 auto;
        background: rgba(255, 100, 100, 0.08); border: 1px solid rgba(255,100,100,0.25);
        color: #ffb3b3; font-size: 13px; padding: 10px 16px; border-radius: 10px;
        margin-bottom: 12px; display: none;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <a class="back" href="/dashboard.html">← Dashboard</a>
      <div class="ainame"><span class="live-dot"></span><span id="aiName">Q</span></div>
      <div style="width:90px"></div>
    </div>

    <div id="messages" class="messages">
      <div class="empty-state" id="emptyState">
        <h2 id="welcomeName">Hey.</h2>
        <p>Tell me anything. I'll figure it out.</p>
        <div class="examples">
          <div class="example" data-prompt="Find me a flight to NYC under $300 next weekend">"Find me a flight to NYC under $300 next weekend"</div>
          <div class="example" data-prompt="Call Tony's, book a table for 4 tonight at 8">"Call Tony's, book a table for 4 tonight at 8"</div>
          <div class="example" data-prompt="Reply to my landlord, ask for a one-week extension">"Reply to my landlord, ask for an extension"</div>
        </div>
      </div>
    </div>

    <div id="errBanner" class="err-banner"></div>

    <div class="composer">
      <div class="composer-inner">
        <textarea id="input" placeholder="Tell your AI what to do..." rows="1"></textarea>
        <button id="send" class="send">Send</button>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const emptyEl = document.getElementById("emptyState");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const errBanner = document.getElementById("errBanner");
      let aiName = "Q";

      // Load profile to get AI name
      (async () => {
        const res = await fetch("/api/profile/me");
        if (res.status === 401) { location.href = "/login.html"; return; }
        if (res.status === 402) { location.href = "/subscribe.html"; return; }
        const data = await res.json();
        if (data.ok && data.profile?.ai_name) {
          aiName = data.profile.ai_name;
          document.getElementById("aiName").textContent = aiName;
          document.getElementById("welcomeName").textContent = `Hey. I'm ${aiName}.`;
        }
      })();

      function showError(msg) {
        errBanner.textContent = msg;
        errBanner.style.display = "block";
        setTimeout(() => { errBanner.style.display = "none"; }, 4000);
      }

      function addMessage(role, text) {
        if (emptyEl) emptyEl.remove();
        const el = document.createElement("div");
        el.className = `msg ${role}`;
        el.textContent = text;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return el;
      }

      // Auto-grow textarea
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(200, inputEl.scrollHeight) + "px";
      });

      // Submit on Enter (shift+enter for newline)
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
      });

      // Example prompt click
      document.querySelectorAll(".example").forEach((el) => {
        el.addEventListener("click", () => {
          inputEl.value = el.dataset.prompt;
          inputEl.focus();
        });
      });

      sendBtn.addEventListener("click", send);

      async function send() {
        const text = inputEl.value.trim();
        if (!text) return;

        addMessage("user", text);
        inputEl.value = "";
        inputEl.style.height = "auto";
        sendBtn.disabled = true;

        const thinkingEl = addMessage("ai thinking", `${aiName} is thinking...`);

        try {
          const res = await fetch("/api/chat/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });

          if (res.status === 429) {
            thinkingEl.remove();
            showError("Daily limit reached. Resets at midnight UTC.");
            sendBtn.disabled = false;
            return;
          }

          const data = await res.json();
          thinkingEl.classList.remove("thinking");
          thinkingEl.classList.add("ai");
          thinkingEl.textContent = data.reply || "(no response)";
        } catch (err) {
          thinkingEl.remove();
          showError(err.message);
        }
        sendBtn.disabled = false;
        inputEl.focus();
      }
    </script>
  </body>
</html>
